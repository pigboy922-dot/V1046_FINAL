services:
  - type: web
    name: v1046-cloud-daily-risk-guard
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn v1046_server:app --workers 1 --threads 4 --timeout 300 --bind 0.0.0.0:$PORT
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TZ
        value: "Asia/Taipei"
      - key: PUBLIC_BASE_URL
        value: "https://v1046-final.onrender.com"

      # 開首頁自動跑正式更新
      - key: V1046_AUTO_RUN_ON_OPEN
        value: "false"
      - key: V1046_AUTO_RUN_MODE
        value: "real"
      - key: V1046_AUTO_OPEN_COOLDOWN_SECONDS
        value: "600"

      # Google Sheets 同步：Sheet ID 已預填
      - key: V1046_SHEETS_ENABLED
        value: "true"
      - key: V1046_GOOGLE_SHEET_ID
        value: "1EiilvPfQBvrDwh1BZHXNR7Ech29h0kW9XoM_gt8qbsg"
      - key: V1046_GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false

      # 同步範圍與雲端鎖
      - key: V1046_SHEETS_STATE_ENABLED
        value: "true"
      - key: V1046_SHEETS_OUTPUT_ENABLED
        value: "true"
      - key: V1046_SHEETS_LOCK_ENABLED
        value: "true"
      - key: V1046_SHEETS_LOCK_TTL_SECONDS
        value: "900"

      # 選填：手動 /api/run 的保護密碼，不填也可跑
      - key: V1046_RUN_TOKEN
        sync: false
